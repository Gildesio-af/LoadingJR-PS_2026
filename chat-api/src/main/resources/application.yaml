spring:
  application:
    name: Chat System Loading
  output:
    ansi:
        enabled: ALWAYS

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/chatdb
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

google:
  api:
    key: ${GOOGLE_API_KEY:AIzaSyBs4Y70GM9ENlyy1Uzil0ZmkWDH-3QRuF4}

app:
  jwtSecret: ${JWTSECRET:mySecretKey}
  jwtExpirationInMs: ${JWTEXPIRATION:86400000}

logging:
  level:
    root: INFO
    com.loandingjr.chat: DEBUG